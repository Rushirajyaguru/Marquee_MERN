<!DOCTYPE html>
<html lang="en">
<head>

    <title>Demo_units
        
    </title>
    <style>
        .body{
            height: 100vh;
            width: 100vw;

        #container{

            border-radius: 1rem;

            display: flex;

            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

<body>
    <div id="container">
        <div class="child">
            <div class ="items"><img class="profile" src="https://img.freepik.com/premium-photo/design-professional-profile-picture-with-sharp-focus-natural-lighting-clean-neutral-background_880763-20280.jpg" alt="profile"></div>
            <div class ="items">2</div>
